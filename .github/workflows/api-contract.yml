name: API contract

# Early-warning system for upstream changes to the Carris Metropolitana API.
# Runs the live contract check daily; if the API drifts from what the app
# expects, the job fails (GitHub emails the repo owner) and an issue is opened.

on:
  schedule:
    - cron: '0 7 * * *' # every day at 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Carris API contract check
        run: node scripts/api-contract-check.mjs

      - name: Open an issue if the contract broke
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'api-drift';
            const title = 'Carris API contract check failed — the API may have changed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            if (open.length > 0) {
              core.info(`An open "${label}" issue already exists (#${open[0].number}); not creating a duplicate.`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: [label],
              body: [
                'The scheduled **API contract check** failed.',
                '',
                'This usually means the Carris Metropolitana API changed shape, so the live tracker, ETAs, or push alerts may be (or are about to be) broken.',
                '',
                `**Failing run:** ${runUrl}`,
                '',
                'Open the run logs to see exactly which check failed, then update `src/services/api.ts` (and `api/cron-check-alerts.ts` if ETAs are involved) accordingly.',
              ].join('\n'),
            });
