<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#FFDD00"/>
  <g transform="translate(256, 270) scale(1.1)" fill="#1A1A1A">
    <!-- Bus body -->
    <path d="M-140,30 L-140,-50 C-140,-80 -120,-100 -90,-100 L110,-100 C140,-100 155,-80 155,-50 L155,30 Z" fill="#1A1A1A"/>
    <!-- Windshield -->
    <path d="M110,-90 L145,-90 C155,-90 160,-80 160,-70 L160,-20 L110,-20 Z" fill="#FFDD00" opacity="0.6"/>
    <!-- Side windows -->
    <rect x="-120" y="-85" width="35" height="30" rx="4" fill="#FFDD00" opacity="0.5"/>
    <rect x="-75" y="-85" width="35" height="30" rx="4" fill="#FFDD00" opacity="0.5"/>
    <rect x="-30" y="-85" width="35" height="30" rx="4" fill="#FFDD00" opacity="0.5"/>
    <rect x="15" y="-85" width="35" height="30" rx="4" fill="#FFDD00" opacity="0.5"/>
    <rect x="60" y="-85" width="35" height="30" rx="4" fill="#FFDD00" opacity="0.5"/>
    <!-- Yellow accent stripe -->
    <rect x="-140" y="-40" width="300" height="12" rx="3" fill="#FFDD00" opacity="0.7"/>
    <!-- Wheels -->
    <circle cx="-90" cy="35" r="22" fill="#1A1A1A" stroke="#FFDD00" stroke-width="4"/>
    <circle cx="-90" cy="35" r="10" fill="#333"/>
    <circle cx="110" cy="35" r="22" fill="#1A1A1A" stroke="#FFDD00" stroke-width="4"/>
    <circle cx="110" cy="35" r="10" fill="#333"/>
    <!-- Bumper -->
    <rect x="-130" y="25" width="280" height="8" rx="4" fill="#333"/>
    <!-- Headlight -->
    <rect x="150" y="-15" width="10" height="12" rx="3" fill="#FFDD00"/>
    <!-- Speed lines -->
    <line x1="-160" y1="-70" x2="-190" y2="-70" stroke="#1A1A1A" stroke-width="5" stroke-linecap="round"/>
    <line x1="-155" y1="-45" x2="-195" y2="-45" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
    <line x1="-150" y1="-20" x2="-185" y2="-20" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
